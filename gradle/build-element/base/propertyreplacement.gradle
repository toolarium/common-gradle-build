		}
		if (project.hasProperty('kubernetesApplicationOIDCClientIdEnvName')) {
			line = line.replace('@@KUBERNETES_APPLICATION_OIDC_CLIENT_ID_ENV_NAME@@', "${project.ext.kubernetesApplicationOIDCClientIdEnvName}".toString())
		}
		if (project.hasProperty('kubernetesApplicationOIDCClientIdKey')) {
			line = line.replace('@@KUBERNETES_APPLICATION_OIDC_CLIENT_ID_KEY@@', "${project.ext.kubernetesApplicationOIDCClientIdKey}".toString())
		}
		if (project.hasProperty('kubernetesApplicationOIDCPublicKeyEnvName')) {
			line = line.replace('@@KUBERNETES_APPLICATION_OIDC_PUBLICKEY_ID_ENV_NAME@@', "${project.ext.kubernetesApplicationOIDCPublicKeyEnvName}".toString())
		}
		if (project.hasProperty('kubernetesApplicationOIDCPublicKeyKey')) {
			line = line.replace('@@KUBERNETES_APPLICATION_OIDC_PUBLICKEY_KEY@@', "${project.ext.kubernetesApplicationOIDCPublicKeyKey}".toString())
		}
		if (project.hasProperty('kubernetesApplicationOIDCClientId')) {
			line = line.replace('@@KUBERNETES_APPLICATION_OIDC_CLIENT_ID@@', "${project.ext.kubernetesApplicationOIDCClientId}")
		}
		if (project.hasProperty('kubernetesApplicationOIDCPublicKey')) {
			line = line.replace('@@KUBERNETES_APPLICATION_OIDC_PUBLICKEY@@', "${project.ext.kubernetesApplicationOIDCPublicKey}".toString())
		}
		if (project.hasProperty('kubernetesApplicationOIDCAuthServerUrlName')) {
			line = line.replace('@@KUBERNETES_APPLICATION_OIDC_AUTH_SERVER_URL_NAME@@', "${project.ext.kubernetesApplicationOIDCAuthServerUrlName}".toString())
		}
		if (project.hasProperty('kubernetesApplicationOIDCAuthServerUrlKey')) {
			line = line.replace('@@KUBERNETES_APPLICATION_OIDC_AUTH_SERVER_URL_KEY@@', "${project.ext.kubernetesApplicationOIDCAuthServerUrlKey}".toString())
		}
		if (project.hasProperty('kubernetesApplicationOIDCAuthServerUrl')) {
			line = line.replace('@@KUBERNETES_APPLICATION_OIDC_AUTH_SERVER_URL@@', "${project.ext.kubernetesApplicationOIDCAuthServerUrl}")
		}
		if (project.hasProperty('kubernetesApplicationOIDCTokenIssuerName')) {
			line = line.replace('@@KUBERNETES_APPLICATION_OIDC_TOKEN_ISSUER_NAME@@', "${project.ext.kubernetesApplicationOIDCTokenIssuerName}".toString())
		}
		if (project.hasProperty('kubernetesApplicationOIDCTokenIssuerKey')) {
