/** 
 * Search and replace by properties
 */
ext.searchReplaceByProperties = { inputLine, replacePlaceHolders = true ->
	def line = inputLine

	if (replacePlaceHolders) {
		line = line.replace('@@PROJECT_NAME@@', "${rootProject.name}".toString())
		line = line.replace('@@PROJECT_TYPE@@', "${project.ext.projectType}".toString())
		line = line.replace('@@GROUP_ID@@', "${project.ext.projectGroupId}".toString())
		line = line.replace('@@COMPONENT_ID@@', "${project.ext.projectComponentId}".toString())
		
		if (project.hasProperty('projectParentPackageName')) {
			line = line.replace('@@PARENT_PACKAGE@@', "${project.ext.projectParentPackageName}".toString())
		}
		
		line = line.replace('@@PACKAGE@@', "${project.ext.projectRootPackageName}".toString())
		line = line.replace('@@DESCRIPTION@@', "${project.ext.projectDescription}".toString())
		line = line.replace('@@URL@@', "${project.ext.projectUrl}".toString())
		line = line.replace('@@LICENSE@@', "${project.ext.licenseText}".toString())
		line = line.replace('@@LICENSE_ORGANISATION@@', "${project.ext.licenseOrganisation}".toString())			
		line = line.replace('@@MAJOR_NUMBER@@', "${project.ext.majorVersionNumber}".toString())
		line = line.replace('@@MINOR_NUMBER@@', "${project.ext.minorVersionNumber}".toString())
		line = line.replace('@@REVISION_NUMBER@@', "${project.ext.revisionVersionNumber}".toString())
		line = line.replace('@@MICRO_NUMBER@@', "${project.ext.revisionVersionNumber}".toString())
		line = line.replace('@@QUALIFIER@@', "${project.ext.qualifierVersionNumber}".toString())
		line = line.replace('@@SCM_NUMBER@@', "${project.ext.scmVersionNumber}".toString())
		line = line.replace('@@BUILD_TIMESTAMP@@', "${project.ext.BUILD_TIMESTAMP}".toString())
		line = line.replace('@@BUILD_TIMESTAMP_SHORT@@', "${project.ext.BUILD_TIMESTAMP_SHORT}".toString())
		line = line.replace('@@DATE@@', "${DATE}".toString())
		line = line.replace('@@YEAR@@', "${YEAR}".toString())
		line = line.replace('@@IS_RELEASE_VERSION@@', "${project.ext.isReleaseVersion}".toString())
		line = line.replace('@@VERSION@@', "${project.version}".toString())
		line = line.replace('@@LINE@@', "${LINE}".toString())
		line = line.replace('@@STAR_LINE@@', "${STAR_LINE}".toString())			
		line = line.replace('@@COMMON_GRADLE_BUILD_URL@@', "${defaultCommonGradleBuildUrl}".toString())
		line = line.replace('@@BUILD_TOOL_VERSION_MESSAGE@@', "${project.ext.buildToolVersionStackMessage}".toString())
		
		line = line.replace('@@sourceCompatibility@@', "${sourceCompatibility}".toString())
		line = line.replace('@@targetCompatibility@@', "${targetCompatibility}".toString())

		// main source
		if (project.hasProperty('srcMainDirectoryName')) {
			line = line.replace('@@MAIN@@', "${project.ext.srcMainDirectoryName}".toString())
		}						
		if (project.hasProperty('srcMainDirectory')) {
			line = line.replace('@@SRC_MAIN@@', "${project.ext.srcMainDirectory}".toString())
		}
				
		// test source
		if (project.hasProperty('srcTestDirectoryName')) {			
			line = line.replace('@@TEST@@', "${srcTestDirectoryName}".toString())
		}						
		if (project.hasProperty('srcTestDirectory')) {			
			line = line.replace('@@SRC_TEST@@', "${srcTestDirectory}".toString())
		}

		// genereated source
		if (project.hasProperty('generatedCommonGradleBuildJavaSources')) {			
			line = line.replace('@@SRC_GEN_MAIN@@', "${generatedCommonGradleBuildJavaSources}".toString())
		}
		if (project.hasProperty('generatedCommonGradleBuildResourcesSources')) {			
			line = line.replace('@@SRC_GEN_RESOURCES@@', "${generatedCommonGradleBuildResourcesSources}".toString())
		}

		// checkstyle
		def checkstyleConfigurationNameToSet = "${rootProject.name}"
		if (project.hasProperty('checkstyleConfigurationName')) {
			checkstyleConfigurationNameToSet = project.getProperty('checkstyleConfigurationName')
		}
		line = line.replace('@@CHECKSTYLE_CONFIGURATION_NAME@@', "${checkstyleConfigurationNameToSet}".toString())
		if (project.hasProperty('runtimeCheckstyleConfigurationPath')) {			
			line = line.replace('@@CHECKSTYLE_CONFIGURATION_PATH@@', "${runtimeCheckstyleConfigurationPath}".toString())
		}
		if (project.hasProperty('checkstyleToolVersion')) {
			line = line.replace('@@checkstyleToolVersion@@', "${project.ext.checkstyleToolVersion}".toString())
		} else {
			line = line.replace('@@checkstyleToolVersion@@', "${project.ext.checkstyleToolDefaultVersion}".toString())
		}

		// libs
		if (project.hasProperty('commonGradleSlf4jApiVersion')) {
			line = line.replace('@@commonGradleSlf4jApiVersion@@', "${project.ext.commonGradleSlf4jApiVersion}".toString())
		}
		if (project.hasProperty('commonGradleLogbackVersion')) {
			line = line.replace('@@commonGradleLogbackVersion@@', "${project.ext.commonGradleLogbackVersion}".toString())
		}
		if (project.hasProperty('commonGradleJptoolsVersion')) {
			line = line.replace('@@commonGradleJptoolsVersion@@', "${project.ext.commonGradleJptoolsVersion}".toString())
		}
		if (project.hasProperty('commonGradleJavaxValidtionVersion')) {
			line = line.replace('@@commonGradleJavaxValidtionVersion@@', "${project.ext.commonGradleJavaxValidtionVersion}".toString())
		}
		if (project.hasProperty('commonGradleJavaxWsRSApiVersion')) {
			line = line.replace('@@commonGradleJavaxWsRSApiVersion@@', "${project.ext.commonGradleJavaxWsRSApiVersion}".toString())
		}
		if (project.hasProperty('commonGradleJacksonAnnotationVersion')) {
			line = line.replace('@@commonGradleJacksonAnnotationVersion@@', "${project.ext.commonGradleJacksonAnnotationVersion}".toString())
		}
		if (project.hasProperty('commonGradleJavaxAnnotationVersion')) {
			line = line.replace('@@commonGradleJavaxAnnotationVersion@@', "${project.ext.commonGradleJavaxAnnotationVersion}".toString())
		}
		if (project.hasProperty('commonGradleJakartaAnnotationVersion')) {
			line = line.replace('@@commonGradleJakartaAnnotationVersion@@', "${project.ext.commonGradleJakartaAnnotationVersion}".toString())
		}
		if (project.hasProperty('commonGradleJakartaValidtionVersion')) {
			line = line.replace('@@commonGradleJakartaValidtionVersion@@', "${project.ext.commonGradleJakartaValidtionVersion}".toString())
		}
		if (project.hasProperty('commonGradleJakartaWsRSApiVersion')) {
			line = line.replace('@@commonGradleJakartaWsRSApiVersion@@', "${project.ext.commonGradleJakartaWsRSApiVersion}".toString())
		}

		if (project.hasProperty('testDependencyVersion')) {
			line = line.replace('@@testDependencyVersion@@', "${project.ext.testDependencyVersion}".toString())
		}
		
		if (project.hasProperty('gradlePropertiesJvmArgs')) {
			line = line.replace('@@GRADLE_JVM_ARG@@', "${project.ext.gradlePropertiesJvmArgs}".toString())
		}
		if (project.hasProperty('gradlePropertiesLogLevel')) {
			line = line.replace('@@GRADLE_LOG_LEVEL@@', "${project.ext.gradlePropertiesLogLevel}".toString())
		}
		if (project.hasProperty('gradlePropertiesConsole')) {
			line = line.replace('@@GRADLE_CONSOLE@@', "${project.ext.gradlePropertiesConsole}".toString())
		}
		if (project.hasProperty('gradlePropertiesWarningMode')) {
			line = line.replace('@@GRADLE_WARNING_MODE@@', "${project.ext.gradlePropertiesWarningMode}".toString())
		}
		if (project.hasProperty('quarkusPluginVersion')) {
			line = line.replace('@@QUARKUS_PLUGIN_VERSION@@', "${project.ext.quarkusPluginVersion}".toString())
		}
		if (project.hasProperty('nodePluginVersion')) {
			line = line.replace('@@NODE_PLUGIN_VERSION@@', "${project.ext.nodePluginVersion}".toString())
		}
		if (project.hasProperty('openapiPluginVersion')) {
			line = line.replace('@@OPENAPI_PLUGIN_VERSION@@', "${project.ext.openapiPluginVersion}".toString())
		}
		
		if (project.hasProperty('className')) {
			line = line.replace('@@className@@', "${project.ext.className}".toString())
			line = line.replace('@@applicationName@@', "${project.ext.projectRootPackageName}.${project.ext.className}".toString())
		}
		if (project.hasProperty('classNameUnderTest')) {
			line = line.replace('@@classNameUnderTest@@', "${project.ext.classNameUnderTest}".toString())
		}
		if (project.hasProperty('fileName')) {
			line = line.replace('@@fileName@@', "${project.ext.fileName}".toString())
		}
		if (project.hasProperty('packageName')) {
			line = line.replace('@@packageName@@', "${project.ext.packageName}".toString())
		}
			
		// docker
		if (project.hasProperty('dockerImage')) {
			line = line.replace('@@dockerImage@@', "${project.ext.dockerImage}".toString())
			line = line.replace('@@DOCKER_IMAGE@@', "${project.ext.dockerImage}".toString())
		}
		if (project.hasProperty('dockerRuntimeImage')) {
			line = line.replace('@@dockerRuntimeImage@@', "${project.ext.dockerRuntimeImage}".toString())
		}
		
		if (project.hasProperty('dockerUID')) {
			line = line.replace('@@dockerUID@@', "${project.ext.dockerUID}".toString())
		}
		if (project.hasProperty('dockerGID')) {
			line = line.replace('@@dockerGID@@', "${project.ext.dockerGID}".toString())
		}
		if (project.hasProperty('dockerExposePort')) {
			line = line.replace('@@dockerExposePort@@', "${project.ext.dockerExposePort}".toString())
			line = line.replace('@@DOCKER_EXPOSE_PORT@@', "${project.ext.dockerExposePort}".toString())
		}
		if (project.hasProperty('dockerUser')) {
			line = line.replace('@@dockerUser@@', "${project.ext.dockerUser}".toString())
		}
		if (project.hasProperty('dockerGroup')) {
			line = line.replace('@@dockerGroup@@', "${project.ext.dockerGroup}".toString())
		}
		if (project.hasProperty('dockerTimezone')) {
			line = line.replace('@@dockerTimezone@@', "${project.ext.dockerTimezone}".toString())
			line = line.replace('@@DOCKER_TIMEZONE@@', "${project.ext.dockerTimezone}".toString())
		}
		if (project.hasProperty('dockerDeploymentSourcePath')) {
			line = line.replace('@@dockerDeploymentSourcePath@@', "${project.ext.dockerDeploymentSourcePath}".toString())
		}
		if (project.hasProperty('dockerSubPathAccess')) {
			line = line.replace('@@dockerSubPathAccess@@', "${project.ext.dockerSubPathAccess}".toString())
		}
		if (project.hasProperty('dockerScriptPath')) {
			line = line.replace('@@dockerScriptPath@@', "${project.ext.dockerScriptPath}".toString())
		}
		if (project.hasProperty('dockerDefaultEncoding')) {
			line = line.replace('@@dockerDefaultEncoding@@', "${project.ext.dockerDefaultEncoding}".toString())
		}
		if (project.hasProperty('dockerDefaultLanguage')) {
			line = line.replace('@@dockerDefaultLanguage@@', "${project.ext.dockerDefaultLanguage}".toString())
		}
		if (project.hasProperty('dockerDefaultLocale')) {
			line = line.replace('@@dockerDefaultLocale@@', "${project.ext.dockerDefaultLocale}".toString())
		}
		if (project.hasProperty('dockerJavaOptions')) {
			line = line.replace('@@dockerJavaOptions@@', "${project.ext.dockerJavaOptions}".toString())
		}
		if (project.hasProperty('dockerDefaultJavaOptions')) {
			line = line.replace('@@dockerDefaultJavaOptions@@', "${project.ext.dockerDefaultJavaOptions}".toString())
		}
		if (project.hasProperty('dockerJavaAgent')) {
			line = line.replace('@@dockerJavaAgent@@', "${project.ext.dockerJavaAgent}".toString())
		}
		if (project.hasProperty('dockerProxyHost')) {
			line = line.replace('@@dockerProxyHost@@', "${project.ext.dockerProxyHost}".toString())
		}
		if (project.hasProperty('dockerProxyPort')) {
			line = line.replace('@@dockerProxyPort@@', "${project.ext.dockerProxyPort}".toString())
		}
		if (project.hasProperty('dockerNoProxyHosts')) {
			line = line.replace('@@dockerNoProxyHosts@@', "${project.ext.dockerNoProxyHosts}".toString())
		}
		if (project.hasProperty('dockerHttpAgent')) {
			line = line.replace('@@dockerHttpAgent@@', "${project.ext.dockerHttpAgent}".toString())
		}
		if (project.hasProperty('dockerKeepAlive')) {
			line = line.replace('@@dockerKeepAlive@@', "${project.ext.dockerKeepAlive}".toString())
		}
		if (project.hasProperty('dockerMaxConnections')) {
			line = line.replace('@@dockerMaxConnections@@', "${project.ext.dockerMaxConnections}".toString())
		}
		if (project.hasProperty('dockerMaxRedirects')) {
			line = line.replace('@@dockerMaxRedirects@@', "${project.ext.dockerMaxRedirects}".toString())
		}
		if (project.hasProperty('dockerOsVersion')) {
			line = line.replace('@@dockerOsVersion@@', "${project.ext.dockerOsVersion}".toString())
		}
		if (project.hasProperty('dockerLogLevel')) {
			line = line.replace('@@dockerLogLevel@@', "${project.ext.dockerLogLevel}".toString())
		}
		if (project.hasProperty('dockerGc')) {
			line = line.replace('@@dockerGc@@', "${project.ext.dockerGc}".toString())
		}
		if (project.hasProperty('dockerGcLogging')) {
			line = line.replace('@@dockerGcLogging@@', "${project.ext.dockerGcLogging}".toString())
		}
		if (project.hasProperty('dockerExitOnOutOfMemory')) {
			line = line.replace('@@dockerExitOnOutOfMemory@@', "${project.ext.dockerExitOnOutOfMemory}".toString())
		}
		if (project.hasProperty('dockerNativeMemoryTracking')) {
			line = line.replace('@@dockerNativeMemoryTracking@@', "${project.ext.dockerNativeMemoryTracking}".toString())
		}
		if (project.hasProperty('dockerObserveMemoryCycle')) {
			line = line.replace('@@dockerObserveMemoryCycle@@', "${project.ext.dockerObserveMemoryCycle}".toString())
		}
		if (project.hasProperty('dockerMeminfo')) {
			line = line.replace('@@dockerMeminfo@@', "${project.ext.dockerMeminfo}".toString())
		}
		if (project.hasProperty('dockerJavaRunner')) {
			line = line.replace('@@dockerJavaRunner@@', "${project.ext.dockerJavaRunner}".toString())
		}
		if (project.hasProperty('toolariumJavaRunnerLogPackage')) {
			line = line.replace('@@toolariumJavaRunnerLogPackage@@', "${project.ext.toolariumJavaRunnerLogPackage}".toString())
		}
		if (project.hasProperty('toolariumJavaRunnerLogCategoryWidth')) {
			line = line.replace('@@toolariumJavaRunnerLogCategoryWidth@@', "${project.ext.toolariumJavaRunnerLogCategoryWidth}".toString())
		}
		if (project.hasProperty('toolariumJavaRunnerLogCategoryMax')) {
			line = line.replace('@@toolariumJavaRunnerLogCategoryMax@@', "${project.ext.toolariumJavaRunnerLogCategoryMax}".toString())
		}
		if (project.hasProperty('toolariumJavaRunnerLogInfoWidth')) {
			line = line.replace('@@toolariumJavaRunnerLogInfoWidth@@', "${project.ext.toolariumJavaRunnerLogInfoWidth}".toString())
		}
		if (project.hasProperty('toolariumJavaRunnerLogInfoMax')) {
			line = line.replace('@@toolariumJavaRunnerLogInfoMax@@', "${project.ext.toolariumJavaRunnerLogInfoMax}".toString())
		}
		if (project.hasProperty('dockerEnableAccessLog')) {
			line = line.replace('@@dockerEnableAccessLog@@', "${project.ext.dockerEnableAccessLog}".toString())
		}
		if (project.hasProperty('dockerRemoveNonEssentialBinaries')) {
			line = line.replace('@@dockerRemoveNonEssentialBinaries@@', "${project.ext.dockerRemoveNonEssentialBinaries}".toString())
		}
		if (project.hasProperty('dockerMakeFilesystemReadonly')) {
			line = line.replace('@@dockerMakeFilesystemReadonly@@', "${project.ext.dockerMakeFilesystemReadonly}".toString())
		}
		if (project.hasProperty('dockerRemovePackageInstallationBinaries')) {
			line = line.replace('@@dockerRemovePackageInstallationBinaries@@', "${project.ext.dockerRemovePackageInstallationBinaries}".toString())
		}
		if (project.hasProperty('dockerRemoveImageVersion')) {
			line = line.replace('@@dockerRemoveImageVersion@@', "${project.ext.dockerRemoveImageVersion}".toString())
		}
		if (project.hasProperty('dockerRemovePackageVersions')) {
			line = line.replace('@@dockerRemovePackageVersions@@', "${project.ext.dockerRemovePackageVersions}".toString())
		}
		if (project.hasProperty('dockerReadonlyFilesystemPath')) {
			line = line.replace('@@dockerReadonlyFilesystemPath@@', "${project.ext.dockerReadonlyFilesystemPath}".toString())
		}
		if (project.hasProperty('dockerReadonlyFilesystemExcludePath')) {
			line = line.replace('@@dockerReadonlyFilesystemExcludePath@@', "${project.ext.dockerReadonlyFilesystemExcludePath}".toString())
		}
		if (project.hasProperty('dockerEntrypoint')) {
			line = line.replace('@@dockerEntrypoint@@', "${project.ext.dockerEntrypoint}".toString())
		}
		if (project.hasProperty('dockerRepositoryHost')) {
			line = line.replace('@@DOCKER_REPOSITORY_HOST@@', "${project.ext.dockerRepositoryHost}".toString())
		}
		if (project.hasProperty('dockerTagPrefix')) {
			line = line.replace('@@DOCKER_TAG_PREFIX@@', "${project.ext.dockerTagPrefix}".toString())
		}
		if (project.hasProperty('servicePropertiesName')) {
			line = line.replace('@@servicePropertiesName@@', "${project.ext.servicePropertiesName}".toString())
		}
		
		// kubernetes
		if (project.hasProperty('kubernetesLabelId')) {
			line = line.replace('@@KUBERNETES_LABEL_ID@@', "${project.ext.kubernetesLabelId}".toString())
		}
		if (project.hasProperty('kubernetesUrlRootPath')) {
			line = line.replace('@@KUBERNETES_URL_ROOT_PATH@@', "${project.ext.kubernetesUrlRootPath}".toString())
		}
		if (project.hasProperty('kubernetesUrlPath')) {
			line = line.replace('@@KUBERNETES_URL_PATH@@', "${project.ext.kubernetesUrlPath}".toString())
		}
		if (project.hasProperty('kubernetesNamespace')) {
			line = line.replace('@@KUBERNETES_NAMESPACE@@', "${project.ext.kubernetesNamespace}".toString())
		}
		if (project.hasProperty('kubernetesReplicas')) {
			line = line.replace('@@KUBERNETES_REPLICAS@@', "${project.ext.kubernetesReplicas}".toString())
		}
		if (project.hasProperty('kubernetesDockerImage')) {
			line = line.replace('@@KUBERNETES_DOCKER_IMAGE@@', "${project.ext.kubernetesDockerImage}".toString())
		}
		
		// kubernetes / ingres
		if (project.hasProperty('kubernetesIngressProxyBufferSize')) {
			line = line.replace('@@KUBERNETES_INGRESS_PROXY_BUFFER_SIZE@@', "${project.ext.kubernetesIngressProxyBufferSize}".toString())
		}
		if (project.hasProperty('kubernetesIngressProxyBodySize')) {
			line = line.replace('@@KUBERNETES_INGRESS_PROXY_BODY_SIZE@@', "${project.ext.kubernetesIngressProxyBodySize}".toString())
		}
		if (project.hasProperty('kubernetesGatewayClassName')) {
			line = line.replace('@@KUBERNETES_GATEWAY_CLASS_NAME@@', "${project.ext.kubernetesGatewayClassName}".toString())
		}
		if (project.hasProperty('kubernetesGatewayListenerPort')) {
			line = line.replace('@@KUBERNETES_GATEWAY_LISTENER_PORT@@', "${project.ext.kubernetesGatewayListenerPort}".toString())
		}
		if (project.hasProperty('kubernetesGatewayListenerProtocol')) {
			line = line.replace('@@KUBERNETES_GATEWAY_LISTENER_PROTOCOL@@', "${project.ext.kubernetesGatewayListenerProtocol}".toString())
		}

		// gateway name defaults to project name + "-gateway"
		def gatewayName = "${rootProject.name}-gateway"
		if (project.hasProperty('kubernetesGatewayName')) {
			gatewayName = "${project.ext.kubernetesGatewayName}".toString()
		}
		line = line.replace('@@KUBERNETES_GATEWAY_NAME@@', gatewayName)

		// kubernetes / application.properties environment variable names
		if (project.hasProperty('kubernetesDatabaseKind')) {
			line = line.replace('@@KUBERNETES_DATABASE_KIND@@', "${project.ext.kubernetesDatabaseKind}".toString())
		}
		if (project.hasProperty('kubernetesDatabaseKindEnvName')) {
