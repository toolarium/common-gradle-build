		}
		if (project.hasProperty('kubernetesApplicationOIDCTokenIssuer')) {
			line = line.replace('@@KUBERNETES_APPLICATION_OIDC_TOKEN_ISSUER@@', "${project.ext.kubernetesApplicationOIDCTokenIssuer}")
		}
		// kubernetes application config
		if (project.hasProperty('kubernetesApplicationConfigName')) {
			line = line.replace('@@KUBERNETES_APPLICATION_CONFIG_NAME@@', "${project.ext.kubernetesApplicationConfigName}".toString())
		}
		if (project.hasProperty('kubernetesDatabaseUrlKey')) {
