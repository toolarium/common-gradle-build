/***************************************************************************************
 * java-app defaults
 ***************************************************************************************/
if ("$quarkusPluginVersion".toString().equals("3.20.6")) {
    configurations.all {
        resolutionStrategy {
            force 'com.fasterxml.jackson.core:jackson-core:2.18.9'
            force 'io.netty:netty-codec-http:4.1.132.Final'
            force 'io.netty:netty-codec-http2:4.1.132.Final'
        }
    }
}

if ("$quarkusPluginVersion".toString().equals("3.20.6.2")) {
    configurations.all {
        resolutionStrategy {
            force 'com.fasterxml.jackson.core:jackson-core:2.18.6'
            force 'io.netty:netty-codec:4.1.133.Final'
            force 'io.netty:netty-codec-http:4.1.135.Final'
            force 'io.netty:netty-codec-http2:4.1.135.Final'
            force 'io.netty:netty-codec-dns:4.1.133.Final'
            force 'io.netty:netty-codec-haproxy:4.1.135.Final'			
            force 'io.netty:netty-handler:4.1.135.Final'			
            force 'io.netty:netty-resolver-dns:4.1.135.Final'	
            force 'io.netty:netty-handler-proxy:4.1.133.Final'	
            force 'io.vertx:vertx-core:4.5.27'
        }
    }
}


/***************************************************************************************
 * Security: pin dependency minor lines to latest known-safe patch versions.
 * Update these versions when new patches are released.
 ***************************************************************************************/
configurations.all {
    resolutionStrategy.eachDependency { DependencyResolveDetails details ->
        // jackson-databind: pin each active minor line to latest patch
        if (details.requested.group == 'com.fasterxml.jackson.core' && details.requested.name == 'jackson-databind') {
            def ver = details.requested.version
            if (ver?.startsWith('2.18.'))      { details.useVersion '2.18.9'; details.because 'pin 2.18.x to latest patch' }
            else if (ver?.startsWith('2.21.')) { details.useVersion '2.21.5'; details.because 'pin 2.21.x to latest patch' }
            else if (ver?.startsWith('2.22.')) { details.useVersion '2.22.1'; details.because 'pin 2.22.x to latest patch' }
        }
        // logback-classic and logback-core must always be kept in sync
        if (details.requested.group == 'ch.qos.logback' && (details.requested.name == 'logback-classic' || details.requested.name == 'logback-core')) {
            def ver = details.requested.version
            if (ver?.startsWith('1.2.'))      { details.useVersion '1.2.13'; details.because 'pin 1.2.x to latest patch' }
            else if (ver?.startsWith('1.3.')) { details.useVersion '1.3.14'; details.because 'pin 1.3.x to latest patch' }
            else if (ver?.startsWith('1.4.')) { details.useVersion '1.4.14'; details.because 'pin 1.4.x to latest patch' }
            else if (ver?.startsWith('1.5.')) { details.useVersion '1.5.38'; details.because 'pin 1.5.x to latest patch' }
        }
    }
}
