			out.append("### ${svcData.serviceName}" + NL)
			out.append(NL)
			out.append("**Group:** `${formatEnumConfigGroup(configName)}`  " + NL)
			out.append("**Version:** ${svcData.version}  " + NL)
			out.append("**Description:** ${escapeMdCell(enumConfig.description)}" + NL)
			out.append(NL)

			// full configuration keys table
			out.append("#### Configuration Keys" + NL)
			out.append(NL)

			// check if any key in this config has enumeration values or example values
			def hasEnumeration = enumConfig.keyList.any { k -> k.enumerationValue != null && !k.enumerationValue.toString().trim().isEmpty() }
			def hasExample = enumConfig.keyList.any { k -> "key-value".equals(k.type) && k.exampleValue != null && !k.exampleValue.toString().trim().isEmpty() && !"BINARY".equalsIgnoreCase(k.dataType ?: "") }
			def mdColCount = 5 + (hasExample ? 1 : 0) + (hasEnumeration ? 1 : 0) + 1

			def mdHeader = "| Key | Data Type | Size | Cardinality | Default Value"
			def mdSep = "|-----|-----------|------|-------------|---------------"
			if (hasExample) { mdHeader += " | Example"; mdSep += "|--------" }
			if (hasEnumeration) { mdHeader += " | Enumeration"; mdSep += "|-------------" }
			mdHeader += " | Flags |"; mdSep += "|-------|"
			out.append(mdHeader + NL)
			out.append(mdSep + NL)

			def emptyDescCols = (1..(mdColCount - 1)).collect { "|" }.join(" ")

			def sortedKeysMd = enumConfig.keyList.sort { a, b -> a.key.toLowerCase() <=> b.key.toLowerCase() }
			for (def keyElement : sortedKeysMd) {
				def isMandatory = mandatoryKeys.contains(keyElement.key)
				def isKeyValue = ("key-value".equals(keyElement.type))
				def desc = escapeMdCell(keyElement.description)

				if (isKeyValue) {
					def dataType = keyElement.dataType ?: "--"
					def valueSize = formatEnumConfigValueSize(keyElement.valueSize, dataType)
					def cardinality = formatEnumConfigCardinality(keyElement.cardinality)
					def defaultVal = ("BINARY".equalsIgnoreCase(dataType) || keyElement.defaultValue == null || keyElement.defaultValue.toString().trim().isEmpty()) ? "" : "`${escapeMdCell(keyElement.defaultValue)}`"
					def uniqueKey = "" + configName + "#" + keyElement.key
					def flags = []
					if (isMandatory) { flags << "**M**" }
					if (keyElement.confidential) { flags << "S" }
					if (keyElement.uniqueness) { flags << "U" }
					if (customerKeys.contains(uniqueKey)) { flags << "**C**" }
					if (provisionedKeys.contains(uniqueKey)) { flags << "P" }
					def flagsStr = flags.isEmpty() ? "" : flags.join(",")

					def row = "| `${formatEnumConfigKey(keyElement.key)}` | ${dataType} | ${valueSize} | ${cardinality} | ${defaultVal}"
					if (hasExample) {
						def exampleVal = ("BINARY".equalsIgnoreCase(dataType) || keyElement.exampleValue == null || keyElement.exampleValue.toString().trim().isEmpty()) ? "" : "`${escapeMdCell(keyElement.exampleValue)}`"
						row += " | ${exampleVal}"
					}
					if (hasEnumeration) {
						def enumVal = (keyElement.enumerationValue == null || keyElement.enumerationValue.toString().trim().isEmpty()) ? "" : "`${escapeMdCell(keyElement.enumerationValue)}`"
						row += " | ${enumVal}"
					}
					row += " | ${flagsStr} |"
					out.append(row + NL)
					out.append("| &nbsp;&nbsp;_${desc}_ ${emptyDescCols}" + NL)
				} else {
					// key-only entry
					def uniqueKey = "" + configName + "#" + keyElement.key
					def flags = []
					if (keyElement.confidential) { flags << "S" }
					if (customerKeys.contains(uniqueKey)) { flags << "**C**" }
					if (provisionedKeys.contains(uniqueKey)) { flags << "P" }
					def flagsStr = flags.isEmpty() ? "" : flags.join(",")
					def emptyCols = (1..(mdColCount - 3)).collect { " |" }.join("")
					out.append("| `${formatEnumConfigKey(keyElement.key)}` | _Key only_ |${emptyCols} ${flagsStr} |" + NL)
					out.append("| &nbsp;&nbsp;_${desc}_ ${emptyDescCols}" + NL)
				}
			}

			out.append(NL)
			out.append("---" + NL)
			out.append(NL)
		}
	}

	// Legend
	out.append("## Legend" + NL)
	out.append(NL)
	out.append("| Flag | Description |" + NL)
	out.append("|------|-------------|" + NL)
	out.append("| **M** | Mandatory -- must be configured before application startup |" + NL)
	out.append("| S | Secure -- contains sensitive or confidential data |" + NL)
	out.append("| U | Unique -- value must be unique across instances |" + NL)
	out.append("| **C** | Customer -- customer is responsible for providing this value |" + NL)
	out.append("| P | Provisioned -- value is provided through provisioning |" + NL)
	out.append(NL)

	logInfo("  -> Created " + colorize(HIGHLITE_LEVEL, "${outputFile}".replace('\\', '/').replace("$gradleBuildDirectory/", "")))
}


/****************************************************************************************
 * Filter service data list: keep only configs matching the given marker interface.
 * markerInterface == null means keep configs with no marker interfaces.
 ****************************************************************************************/
ext.filterServiceDataByMarker = { serviceDataList, indexMap, markerInterface ->
	def filtered = []
	for (def svcData : serviceDataList) {
		def matchingConfigs = []
		for (def enumConfig : svcData.configList) {
			if (configBelongsToMarker(enumConfig, indexMap, markerInterface)) {
				matchingConfigs << enumConfig
			}
		}
		if (!matchingConfigs.isEmpty()) {
			filtered << [serviceName: svcData.serviceName, version: svcData.version, configList: matchingConfigs]
		}
	}
	return filtered
}


/****************************************************************************************
 * Generate enum configuration documentation (AsciiDoc and/or Markdown).
 * Splits output by marker interface into separate files.
 ****************************************************************************************/
ext.generateEnumConfigurationDoc = { inputPath ->
	if (!new File(inputPath).exists()) {
		return
	}

	new File("${enumConfigurationDocOutputPath}").mkdirs()
	logInfo("> Generate enum-configuration documentation in " + colorize(HIGHLITE_LEVEL, "${enumConfigurationDocOutputPath}".replace('\\', '/').replace("$gradleBuildDirectory/", "")) + "...")

	def serviceDataList = loadEnumConfigurationServiceData(inputPath)
	def mandatoryMap = loadEnumConfigurationMandatoryData(inputPath)
	def indexMap = loadEnumConfigurationIndexData(inputPath)

	if (serviceDataList.isEmpty()) {
		return
	}

	// collect all unique marker interfaces
	def markerInterfaces = [] as Set
	for (def svcData : serviceDataList) {
		for (def enumConfig : svcData.configList) {
			def idxData = indexMap[enumConfig.name] ?: [interfaceList: [], markerInterfaceList: []]
			markerInterfaces.addAll(idxData.markerInterfaceList)
		}
	}

	// generate main file (services without marker interfaces)
	def mainData = filterServiceDataByMarker(serviceDataList, indexMap, null)
	def defaultTitle = "Configuration Reference"
	if (!mainData.isEmpty()) {
		if ("true".equalsIgnoreCase("" + project.getProperty('enumConfigurationDocAsciidoc'))) {
			generateEnumConfigurationAsciidoc(mainData, mandatoryMap, indexMap, "${enumConfigurationDocOutputPath}/configuration.adoc", defaultTitle)
		}
		if ("true".equalsIgnoreCase("" + project.getProperty('enumConfigurationDocMarkdown'))) {
			generateEnumConfigurationMarkdown(mainData, mandatoryMap, indexMap, "${enumConfigurationDocOutputPath}/configuration.md", defaultTitle)
		}
	}

	// generate separate files per marker interface
	for (def marker : markerInterfaces) {
		def markerData = filterServiceDataByMarker(serviceDataList, indexMap, marker)
		if (!markerData.isEmpty()) {
			def suffix = markerInterfaceToFileSuffix(marker)
			def parts = marker.toString().split("\\.")
			def markerSimpleName = parts[parts.length - 1]
			def markerTitle = "${markerSimpleName} Configuration Reference"
			if ("true".equalsIgnoreCase("" + project.getProperty('enumConfigurationDocAsciidoc'))) {
				generateEnumConfigurationAsciidoc(markerData, mandatoryMap, indexMap, "${enumConfigurationDocOutputPath}/configuration-${suffix}.adoc", markerTitle)
			}
			if ("true".equalsIgnoreCase("" + project.getProperty('enumConfigurationDocMarkdown'))) {
				generateEnumConfigurationMarkdown(markerData, mandatoryMap, indexMap, "${enumConfigurationDocOutputPath}/configuration-${suffix}.md", markerTitle)
			}
		}
	}
}
